[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally left unset here -- alembic/env.py reads
# DATABASE_URL from the environment (same variable the app uses) so there's
# one source of truth for the connection string.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
